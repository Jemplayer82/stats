<script>
// Formatting helpers
function formatUptime(seconds) {
  if (!seconds || seconds === 0) return 'off';
  const d = Math.floor(seconds / (3600*24));
  const h = Math.floor(seconds % (3600*24) / 3600);
  const m = Math.floor(seconds % 3600 / 60);
  return `${d}d ${h}h ${m}m`;
}

function formatBytes(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let l = 0, n = parseInt(bytes, 10) || 0;
  while(n >= 1024 && ++l) n = n/1024;
  return n.toFixed(1) + ' ' + units[l];
}

// Track previous network samples for rate calculation
const _netPrev = {};

function calcNetRate(vmid, netin, netout) {
  const now = Date.now();
  const key = vmid;
  const prev = _netPrev[key];
  _netPrev[key] = { netin, netout, ts: now };
  if (!prev) return { inRate: null, outRate: null };
  const elapsed = (now - prev.ts) / 1000; // seconds
  if (elapsed <= 0) return { inRate: null, outRate: null };
  return {
    inRate:  Math.max(0, (netin  - prev.netin)  / elapsed),
    outRate: Math.max(0, (netout - prev.netout) / elapsed),
  };
}

function formatRate(bytesPerSec) {
  if (bytesPerSec === null) return '…';
  const mbps = (bytesPerSec * 8) / 1_000_000;
  if (mbps < 0.1) return (mbps * 1000).toFixed(0) + ' Kbps';
  return mbps.toFixed(1) + ' Mbps';
}

async function loadProxmoxStatus() {
  const sub = document.getElementById('proxmox-sub');
  const grid = document.getElementById('proxmox-grid');

  try {
    const res = await fetch('/api/proxmox-status');
    const data = await res.json();

    if (data.error === 'incomplete_config') {
      sub.textContent = 'not configured — add in Settings';
      grid.innerHTML = '<a href="/settings" class="setup-link">Configure Proxmox →</a>';
      return;
    }
    if (data.error) {
      sub.textContent = 'error: ' + data.error;
      return;
    }

    sub.textContent = 'refreshed ' + new Date().toLocaleTimeString();
    const resources = data.resources;

    // Group by node
    const nodes = {};
    for (const res of resources) {
      const nodeName = res.node;
      if (!nodes[nodeName]) nodes[nodeName] = { info: null, machines: [] };
      if (res.type === 'node') nodes[nodeName].info = res;
      else nodes[nodeName].machines.push(res);
    }

    if (Object.keys(nodes).length === 0) {
      grid.innerHTML = '<p style="color:#718096">No resources found.</p>';
      return;
    }

    grid.innerHTML = Object.entries(nodes).sort(([a],[b]) => a.localeCompare(b)).map(([nodeName, node]) => {
      const info = node.info || {};
      const nodeOnline = info.status === 'online';

      // Node stats
      const cpuPct     = info.cpu != null ? Math.round(info.cpu * 100) : null;
      const memUsed    = info.memory?.used ?? info.mem ?? null;
      const memTotal   = info.memory?.total ?? info.maxmem ?? null;
      const memPct     = memUsed && memTotal ? Math.round(memUsed / memTotal * 100) : null;
      const diskUsed   = info.rootfs?.used ?? info.disk ?? null;
      const diskTotal  = info.rootfs?.total ?? info.maxdisk ?? null;
      const diskPct    = diskUsed && diskTotal ? Math.round(diskUsed / diskTotal * 100) : null;

      const nodeStatsHtml = cpuPct != null ? `
        <div class="px-node-stats">
          <div class="px-node-stat">
            <span class="px-label">CPU</span>
            <div class="px-node-bar"><div class="px-node-bar-fill ${cpuPct>85?'danger':cpuPct>60?'warn':''}" style="width:${cpuPct}%"></div></div>
            <span class="px-node-pct">${cpuPct}%</span>
          </div>
          ${memPct != null ? `<div class="px-node-stat">
            <span class="px-label">RAM</span>
            <div class="px-node-bar"><div class="px-node-bar-fill ${memPct>85?'danger':memPct>60?'warn':''}" style="width:${memPct}%"></div></div>
            <span class="px-node-pct">${memPct}% <small>${formatBytes(memUsed)}/${formatBytes(memTotal)}</small></span>
          </div>` : ''}
          ${diskPct != null ? `<div class="px-node-stat">
            <span class="px-label">Disk</span>
            <div class="px-node-bar"><div class="px-node-bar-fill ${diskPct>85?'danger':diskPct>60?'warn':''}" style="width:${diskPct}%"></div></div>
            <span class="px-node-pct">${diskPct}% <small>${formatBytes(diskUsed)}/${formatBytes(diskTotal)}</small></span>
          </div>` : ''}
        </div>` : '';

      // Sort: stopped first, then running, sorted by name within each group
      const sorted = [...node.machines].sort((a, b) => {
        const aRunning = a.status === 'running' ? 1 : 0;
        const bRunning = b.status === 'running' ? 1 : 0;
        if (aRunning !== bRunning) return aRunning - bRunning;
        return (a.name || '').localeCompare(b.name || '');
      });

      const machineCards = sorted.length === 0
        ? '<div class="px-empty">No VMs or containers</div>'
        : sorted.map(res => {
            const isRunning = res.status === 'running';
            const cpuPct    = Math.round((res.cpu || 0) * 100);
            const icon      = res.type === 'qemu' ? '🖥️' : '📦';
            const { inRate, outRate } = calcNetRate(res.vmid, res.netin || 0, res.netout || 0);
            const memUsed   = res.mem     || 0;
            const memTotal  = res.maxmem  || 0;
            const memPct    = memTotal  > 0 ? Math.round(memUsed  / memTotal  * 100) : null;
            // Build disk bars: one per device for QEMU (guest agent), single bar for LXC
            const agentDisks = res.agent_disks || null;
            const lxcDiskUsed  = res.disk    || 0;
            const lxcDiskTotal = res.maxdisk || 0;
            const diskBarsHtml = (() => {
              if (res.type === 'qemu') {
                if (!agentDisks || !isRunning) {
                  const sz = res.maxdisk > 0 ? formatBytes(res.maxdisk) : null;
                  return sz ? bar(null, 'Disk', sz) : '';
                }
                return agentDisks.map(d => {
                  const pct = d.total > 0 ? Math.round(d.used / d.total * 100) : null;
                  const lbl = d.label.length > 10 ? d.label.slice(-10) : d.label;
                  return bar(pct, lbl, formatBytes(d.used) + '/' + formatBytes(d.total));
                }).join('');
              } else {
                const pct = lxcDiskTotal > 0 ? Math.round(lxcDiskUsed / lxcDiskTotal * 100) : null;
                const sub = lxcDiskTotal > 0 ? formatBytes(lxcDiskUsed) + '/' + formatBytes(lxcDiskTotal) : null;
                return sub ? bar(pct, 'Disk', sub) : '';
              }
            })();

            function bar(pct, label, sub) {
              if (!isRunning || pct === null) return `
                <div class="px-vm-bar-row">
                  <span class="px-label">${label}</span>
                  <div class="px-node-bar" style="flex:1"><div class="px-node-bar-fill" style="width:0%"></div></div>
                  <span class="px-vm-pct">${sub || '-'}</span>
                </div>`;
              const cls = pct > 85 ? 'danger' : pct > 60 ? 'warn' : '';
              return `
                <div class="px-vm-bar-row">
                  <span class="px-label">${label}</span>
                  <div class="px-node-bar" style="flex:1"><div class="px-node-bar-fill ${cls}" style="width:${pct}%"></div></div>
                  <span class="px-vm-pct">${sub || pct + '%'}</span>
                </div>`;
            }

            return `
              <div class="px-card ${!isRunning ? 'is-off' : ''}">
                <div class="px-top">
                  <span class="px-type">${icon} ${res.type.toUpperCase()}</span>
                </div>
                <div class="px-name">${res.name || ''} <small>#${res.vmid}</small></div>
                <div class="px-stats">
                  ${bar(cpuPct, 'CPU')}
                  ${bar(memPct,  'RAM',  memTotal  > 0 ? formatBytes(memUsed)  + '/' + formatBytes(memTotal)  : null)}
                  ${diskBarsHtml}
                  <div class="px-stat-row" style="margin-top:.25rem">
                    <span class="px-label">Uptime</span>
                    <span class="px-value">${formatUptime(res.uptime)}</span>
                  </div>
                  <div class="px-stat-row">
                    <span class="px-label">Net</span>
                    <span class="px-value">↓ ${isRunning ? formatRate(inRate) : '-'} / ↑ ${isRunning ? formatRate(outRate) : '-'}</span>
                  </div>
                </div>
                <div class="px-status ${isRunning ? 'on' : 'off'}">${res.status}</div>
              </div>`;
          }).join('');

      return `
        <div class="px-column">
          <div class="px-column-header node-${nodeName.toLowerCase()}">
            <a href="https://${nodeName.toLowerCase()}.txferguson.net" target="_blank" class="px-column-title server-link">
              <img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/proxmox-light.webp" class="server-icon"> ${nodeName}
            </a>
            <span class="server-header-right">
              ${nodeOnline && info.uptime ? `<span class="server-uptime">${formatUptime(info.uptime)}</span>` : ''}
              <span class="px-status ${nodeOnline ? 'on' : 'off'}" style="position:static;border-radius:4px">${info.status || 'unknown'}</span>
            </span>
          </div>
          ${nodeStatsHtml}
          <div class="px-column-body">${machineCards}</div>
        </div>`;
    }).join('');

  } catch (e) {
    sub.textContent = 'error: ' + e.message;
  }
}

async function loadLiveUsage() {
  const sub  = document.getElementById('live-usage-sub');
  const bars = document.getElementById('live-usage-bars');

  try {
    const res  = await fetch('/api/claude-usage');
    const data = await res.json();

    if (data.error === 'no_cookie') {
      sub.textContent = 'no session cookie — add in Settings';
      bars.innerHTML  = '<a href="/settings" class="setup-link">Configure Claude.ai →</a>';
      return;
    }
    if (data.error === 'auth_failed') {
      sub.textContent = 'session expired — update cookie in Settings';
      bars.innerHTML  = '<a href="/settings" class="setup-link">Update cookie →</a>';
      return;
    }
    if (data.error) {
      sub.textContent = 'error: ' + data.error;
      return;
    }

    sub.textContent = 'live';
    const usage = data.usage;

    const WINDOW_LABELS = {
      five_hour:  '5-Hour Window',
      seven_day:  '7-Day Window',
      extra_usage: 'Extra Usage',
    };

    const fields = [];

    // Parse the real claude.ai format: { five_hour: { utilization, resets_at }, ... }
    for (const [key, val] of Object.entries(usage)) {
      if (!val || val.utilization == null) continue;
      const pct      = Math.round(val.utilization);
      const label    = WINDOW_LABELS[key] || key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      const resetStr = val.resets_at
        ? 'resets ' + new Date(val.resets_at).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
        : '';
      fields.push({ label, pct, resetStr });
    }

    if (fields.length === 0) {
      bars.innerHTML = '<p style="font-size:.8rem;color:#718096">No usage data available.</p>';
      return;
    }

    bars.innerHTML = fields.map(f => `
      <div class="usage-bar-wrap">
        <div class="usage-bar-label">
          <span>${f.label}</span>
          <span class="usage-pct-right">
            <strong>${f.pct}%</strong>
            ${f.resetStr ? `<span style="color:#4a5568;margin-left:.5rem">${f.resetStr}</span>` : ''}
          </span>
        </div>
        <div class="usage-bar-track">
          <div class="usage-bar-fill ${f.pct > 85 ? 'danger' : f.pct > 60 ? 'warn' : ''}"
               style="width:${Math.min(f.pct, 100)}%"></div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('live-usage-sub').textContent = 'error: ' + e.message;
  }
}

async function loadOllamaUsage() {
  const sub  = document.getElementById('ollama-usage-sub');
  const bars = document.getElementById('ollama-usage-bars');

  try {
    const res  = await fetch('/api/ollama-com-usage');
    const data = await res.json();

    if (data.error === 'no_cookie') {
      sub.textContent = 'no session cookie — add in Settings';
      bars.innerHTML  = '<a href="/settings" class="setup-link">Configure Ollama.com →</a>';
      return;
    }
    if (data.error === 'auth_failed') {
      sub.textContent = 'session expired — update cookie in Settings';
      bars.innerHTML  = '<a href="/settings" class="setup-link">Update cookie →</a>';
      return;
    }
    if (data.error) {
      sub.textContent = 'error: ' + data.error;
      bars.innerHTML  = '<pre style="font-size:.7rem;color:#718096;white-space:pre-wrap">' +
                        JSON.stringify(data, null, 2) + '</pre>';
      return;
    }

    sub.textContent = 'live';
    const usage  = data.data;
    const fields = extractOllamaFields(usage);

    if (fields.length === 0) {
      bars.innerHTML = '<pre style="font-size:.7rem;color:#718096;overflow:auto;max-height:160px">' +
                       JSON.stringify(usage, null, 2) + '</pre>';
      return;
    }

    bars.innerHTML = fields.map(f => `
      <div class="usage-bar-wrap">
        <div class="usage-bar-label">
          <span>${f.label}</span>
          <span class="usage-pct-right">
            <strong>${f.pct}%</strong>
            ${f.sub ? `<span style="color:#4a5568;margin-left:.5rem">${f.sub}</span>` : ''}
          </span>
        </div>
        <div class="usage-bar-track">
          <div class="usage-bar-fill ${f.pct > 85 ? 'danger' : f.pct > 60 ? 'warn' : ''}"
               style="width:${Math.min(f.pct, 100)}%"></div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('ollama-usage-sub').textContent = 'error: ' + e.message;
  }
}

function extractOllamaFields(data) {
  // data is an array of {label, pct, resets_at} scraped from the settings page
  if (Array.isArray(data)) {
    return data.map(item => ({
      label:    item.label,
      pct:      item.pct,
      sub: item.resets_at
        ? 'resets ' + new Date(item.resets_at).toLocaleString(undefined,
            { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
        : '',
    }));
  }
  return [];
}

async function loadGeminiUsage() {
  const sub = document.getElementById('gemini-usage-sub');

  try {
    const res = await fetch('/api/gemini-usage');

            <strong>${q.usage.toLocaleString()}</strong>

          <div class="usage-bar-fill" style="width: 100%; opacity: 0.3;"></div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    sub.textContent = 'error: ' + e.message;
  }
}

function buildSparkline(net) {
  const W = 280, H = 80, pad = 4;
  const rx = net.rx, tx = net.tx;
  const allVals = [...rx, ...tx].filter(v => v != null);
  if (!allVals.length) return '';
  const maxVal = Math.max(...allVals) || 1;

  function toPath(vals, filled) {
    const pts = vals.map((v, i) => {
      const x = pad + (i / (vals.length - 1)) * (W - pad * 2);
      const y = H - pad - ((v || 0) / maxVal) * (H - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    if (filled) {
      const first = `${pad},${H - pad}`;
      const last  = `${(W - pad).toFixed(1)},${H - pad}`;
      return `M${first} L${pts.join(' L')} L${last} Z`;
    }
    return `M${pts.join(' L')}`;
  }

  const currentRx = rx[rx.length - 1] || 0;
  const currentTx = tx[tx.length - 1] || 0;

  return `
    <div class="tn-spark-wrap">
      <div class="tn-spark-title">${net.interface} <span class="tn-spark-legend"><span style="color:#3b82f6">↓ ${formatRate(currentRx)}</span> <span style="color:#f59e0b">↑ ${formatRate(currentTx)}</span></span></div>
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" class="tn-sparkline">
        <defs>
          <linearGradient id="rxGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
          </linearGradient>
          <linearGradient id="txGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
          </linearGradient>
        </defs>
        <path d="${toPath(rx, true)}"  fill="url(#rxGrad)" stroke="none"/>
        <path d="${toPath(tx, true)}"  fill="url(#txGrad)" stroke="none"/>
        <path d="${toPath(rx, false)}" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
        <path d="${toPath(tx, false)}" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
      </svg>
      <div class="tn-spark-sub">Last hour — 1 min resolution</div>
    </div>`;
}

async function loadTrueNASStatus() {
  const sub     = document.getElementById('truenas-sub');
  const content = document.getElementById('truenas-content');

  try {
    const res  = await fetch('/api/truenas-status');
    const data = await res.json();

    if (data.error === 'incomplete_config') {
      sub.textContent   = 'not configured — add in Settings';
      content.innerHTML = '<a href="/settings" class="setup-link">Configure TrueNAS →</a>';
      return;
    }
    if (data.error) {
      sub.textContent = 'error: ' + data.error;
      return;
    }

    sub.innerHTML = `<span class="server-uptime">${formatUptime(data.uptime)}</span><span class="px-status on" style="position:static;border-radius:4px">online</span>`;

    // Storage health cards
    const healthHtml = `
      <div class="truenas-health-grid">
        ${data.pools.map(p => {
          const scan = p.scan;
          const isScanning = scan.state === 'SCANNING';
          const scanLabel = scan.function === 'RESILVER' ? 'Resilvering' : scan.function === 'SCRUB' ? 'Scrub' : scan.function;

          let scanHtml = '';
          if (isScanning) {
            const timeLeft = scan.secs_left ? formatUptime(scan.secs_left) + ' left' : '';
            scanHtml = `
              <div class="tn-scan-row">
                <span class="tn-scan-label">${scanLabel} <span class="tn-scan-pct">${scan.percentage}%</span> <small>${timeLeft}</small></span>
                <div class="px-node-bar" style="margin-top:.3rem">
                  <div class="px-node-bar-fill warn" style="width:${Math.min(scan.percentage,100)}%"></div>
                </div>
              </div>`;
          } else if (scan.function) {
            const lastRun = scan.end_time ? new Date(scan.end_time).toLocaleDateString(undefined, {month:'short',day:'numeric',year:'numeric'}) : 'unknown';
            scanHtml = `<div class="tn-scan-row"><span class="tn-scan-label">Last ${scanLabel}: ${lastRun} — <span class="${scan.errors > 0 ? 'tn-err' : 'tn-ok'}">${scan.errors} errors</span></span></div>`;
          }

          return `
            <div class="tn-health-card ${!p.healthy ? 'tn-unhealthy' : p.warning ? 'tn-warning' : ''}">
              <div class="tn-health-top">
                <span class="tn-pool-name">${p.name}</span>
                <span class="badge ${p.status === 'ONLINE' ? 'badge-online' : 'badge-offline'}">${p.status}</span>
              </div>
              ${p.status_detail ? `<div class="tn-detail">${p.status_detail}</div>` : ''}
              <div class="tn-stats-row">
                <span class="px-label">Fragmentation</span>
                <span class="px-value">${p.fragmentation}%</span>
              </div>
              ${scanHtml}
            </div>`;
        }).join('')}
      </div>`;

    const alertsHtml = data.alerts.length === 0 ? '' : `
      <div class="truenas-alerts">
        ${data.alerts.map(a => `
          <div class="truenas-alert ${a.level === 'CRITICAL' ? 'danger' : 'warn'}">
            <strong>${a.level}</strong> ${a.text}
          </div>`).join('')}
      </div>`;

    const poolsHtml = data.pools.map(p => {
      const usedPct = p.size > 0 ? Math.round(p.allocated / p.size * 100) : 0;
      return `
        <div class="px-node-stat" style="grid-template-columns: 6rem 1fr auto">
          <span class="px-label">${p.name}</span>
          <div class="px-node-bar">
            <div class="px-node-bar-fill ${usedPct > 85 ? 'danger' : usedPct > 60 ? 'warn' : ''}"
                 style="width:${usedPct}%"></div>
          </div>
          <span class="px-node-pct">${usedPct}%
            <small>${formatBytes(p.allocated)} / ${formatBytes(p.size)}</small>
            &nbsp;<span class="badge ${p.status === 'ONLINE' ? 'badge-online' : 'badge-offline'}">${p.status}</span>
          </span>
        </div>`;
    }).join('');

    const sparkHtml = data.network ? buildSparkline(data.network) : '';

    content.innerHTML = healthHtml + alertsHtml + `
      <div class="tn-bottom-row">
        <div class="tn-spark-col">
          <div class="tn-spark-wrap">
            <div class="tn-spark-title">Storage</div>
            <div class="tn-pools-inner">${poolsHtml}</div>
          </div>
        </div>
        ${sparkHtml ? `<div class="tn-spark-col">${sparkHtml}</div>` : ''}
      </div>`;
  } catch (e) {
    document.getElementById('truenas-sub').innerHTML = `<span class="px-status off" style="position:static;border-radius:4px">error</span>`;
  }
}

async function loadCephStatus() {
  const sub     = document.getElementById('ceph-sub');
  const content = document.getElementById('ceph-content');

  try {
    const res  = await fetch('/api/ceph-status');
    const data = await res.json();

    if (data.error) {
      sub.innerHTML = `<span class="px-status off" style="position:static;border-radius:4px">error</span>`;
      return;
    }

    const healthClass = data.health === 'HEALTH_OK' ? 'on' : 'off';
    const healthLabel = data.health.replace('HEALTH_', '');
    sub.innerHTML = `<span class="px-status ${healthClass}" style="position:static;border-radius:4px">${healthLabel}</span>`;

    const usedPct  = data.bytes_total > 0 ? Math.round(data.bytes_used / data.bytes_total * 100) : 0;
    const barClass = usedPct > 85 ? 'danger' : usedPct > 70 ? 'warn' : '';

    const checksHtml = data.checks.length === 0 ? '' : `
      <div class="truenas-alerts" style="margin-bottom:.75rem">
        ${data.checks.map(c => `
          <div class="truenas-alert ${c.severity === 'HEALTH_ERR' ? 'danger' : 'warn'}">
            <strong>${c.severity.replace('HEALTH_', '')}</strong> ${c.message}
          </div>`).join('')}
      </div>`;

    content.innerHTML = checksHtml + `
      <div class="ceph-grid">
        <div class="tn-spark-wrap">
          <div class="tn-spark-title">Storage</div>
          <div style="margin-top:.5rem">
            <div class="px-node-stat" style="grid-template-columns:4rem 1fr auto">
              <span class="px-label">Used</span>
              <div class="px-node-bar">
                <div class="px-node-bar-fill ${barClass}" style="width:${usedPct}%"></div>
              </div>
              <span class="px-node-pct">${usedPct}% <small>${formatBytes(data.bytes_used)} / ${formatBytes(data.bytes_total)}</small></span>
            </div>
          </div>
        </div>

        <div class="tn-spark-wrap">
          <div class="tn-spark-title">OSDs</div>
          <div class="ceph-stats">
            <div class="ceph-stat"><span class="ceph-val">${data.num_up_osds}/${data.num_osds}</span><span class="ceph-lbl">up/total</span></div>
            <div class="ceph-stat"><span class="ceph-val">${data.num_in_osds}</span><span class="ceph-lbl">in</span></div>
            <div class="ceph-stat"><span class="ceph-val">${data.num_pgs}</span><span class="ceph-lbl">PGs</span></div>
          </div>
        </div>

        <div class="tn-spark-wrap">
          <div class="tn-spark-title">Throughput</div>
          <div class="ceph-stats">
            <div class="ceph-stat"><span class="ceph-val" style="color:#3b82f6">↓ ${formatBytes(data.read_bytes_sec)}/s</span><span class="ceph-lbl">${data.read_op_sec} IOPS</span></div>
            <div class="ceph-stat"><span class="ceph-val" style="color:#f59e0b">↑ ${formatBytes(data.write_bytes_sec)}/s</span><span class="ceph-lbl">${data.write_op_sec} IOPS</span></div>
          </div>
        </div>
      </div>`;
  } catch (e) {
    document.getElementById('ceph-sub').innerHTML = `<span class="px-status off" style="position:static;border-radius:4px">error</span>`;
  }
}

loadLiveUsage();
loadOllamaUsage();
loadGeminiUsage();
loadProxmoxStatus();
loadCephStatus();
loadTrueNASStatus();

// Refresh AI usage bars every 60 seconds
setInterval(() => {
  loadLiveUsage();
  loadOllamaUsage();
  loadGeminiUsage();
}, 60_000);

// Refresh Proxmox every 15 seconds to track live migrations
setInterval(loadProxmoxStatus, 15_000);

// Refresh Ceph every 15 seconds
setInterval(loadCephStatus, 15_000);

// Refresh TrueNAS every 30 seconds
setInterval(loadTrueNASStatus, 30_000);
</script>

{% endblock %}
