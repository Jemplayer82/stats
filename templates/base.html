<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Usage Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}" class="brand">AI Usage</a>
    <div class="nav-links">
      <a href="{{ url_for('sync') }}">Sync</a>
      <a href="{{ url_for('settings') }}">Settings</a>
    </div>
    <a href="{{ url_for('add') }}" class="btn-add">+ Log Usage</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
